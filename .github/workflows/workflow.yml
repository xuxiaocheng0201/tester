name: Build

permissions:
  contents: read

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-arm:
    name: Build arm64
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: cargo build

      - name: gdb
        run: gdb --batch -ex="run" -ex="quit" ./tester/target/debug/tester

  build-amd:
    name: Build amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: cargo build

      - name: gdb
        run: gdb --batch -ex="run" -ex="quit" ./tester/target/debug/tester

name: Build

permissions:
  contents: read

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-arm:
    name: Build arm64
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          cargo build --release
          ./target/release/tester

      - name: gdb
        shell: bash
        run: |
          file ./target/release/tester.exe
          gdb --batch -ex="run" -ex="quit" ./target/release/tester

  build-amd:
    name: Build amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          cargo build --release
          ./target/release/tester

      - name: gdb
        shell: bash
        run: |
          file ./target/release/tester.exe
          gdb --batch -ex="run" -ex="quit" ./target/release/tester

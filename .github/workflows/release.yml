name: Build Release

permissions:
  contents: read

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-linux-x86_64:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Check rust version
        run: rustup --version

      - name: Checkout
        uses: actions/checkout@v4

#      - name: Install packages
#        run: |
#          sudo apt-get update -y && sudo apt-get upgrade -y
#          sudo apt-get install -y build-essential musl-tools
#          rustup target add x86_64-unknown-linux-musl

      - name: Find gcc
        continue-on-error: true
        run: sudo find / -name x86_64-linux-musl-gcc

      - name: Find g++
        continue-on-error: true
        run: sudo find / -name x86_64-linux-musl-g++

      - name: Find clang
        continue-on-error: true
        run: sudo find / -name x86_64-linux-musl-clang

      - name: Find clang++
        continue-on-error: true
        run: sudo find / -name x86_64-linux-musl-clang++

